<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Today is the Day | Jude Pascal</title>
  <meta name="description" content="Today is the Day by Jude Pascal — interactive cassette player, vinyl and CD available now.">
  <link rel="icon" href="assets/favicon.png" type="image/png">
  <script>
    // Early fetch: track 1 + small click SFX (92 KB total, negligible)
    // Loop SFX (6.4 MB) deliberately excluded — they competed for bandwidth with track 1
    window.__audioEarly = {
      track0: fetch('assets/audio/01-cobwebs.mp3').then(function(r) { return r.arrayBuffer(); }),
      sfxPlay: fetch('assets/audio/sfx-play.mp3').then(function(r) { return r.arrayBuffer(); }),
      sfxStop: fetch('assets/audio/sfx-stop.mp3').then(function(r) { return r.arrayBuffer(); }),
      sfxRewindPress: fetch('assets/audio/sfx-rewind-press.mp3').then(function(r) { return r.arrayBuffer(); }),
      sfxFfPress: fetch('assets/audio/sfx-fast-forward-press.mp3').then(function(r) { return r.arrayBuffer(); }),
    };
  </script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="loader" id="loader" aria-hidden="true">
    <div class="loader__panel">
      <div class="loader__text">Loading...</div>
      <div class="loader__bar"><div class="loader__fill" id="loaderFill"></div></div>
    </div>
  </div>
  <main class="page">
    <section class="player-wrap" aria-label="Cassette player">
      <div class="player" id="player">
        <img class="player__layer player__reel" id="reelA" src="assets/reels-full/reel-001.webp" width="1731" height="3107" alt="">

        <img class="player__layer player__body" src="assets/player.webp" width="1731" height="3107" alt="Vintage cassette recorder">

        <div class="player__layer player__spinner-stack" id="spinnerStack">
          <img class="player__spinner-frame is-active" data-frame="1" src="assets/spinners-full/spinner-1.webp" width="1731" height="3107" alt="">
          <img class="player__spinner-frame" data-frame="2" src="assets/spinners-full/spinner-2.webp" width="1731" height="3107" alt="">
          <img class="player__spinner-frame" data-frame="3" src="assets/spinners-full/spinner-3.webp" width="1731" height="3107" alt="">
          <img class="player__spinner-frame" data-frame="4" src="assets/spinners-full/spinner-4.webp" width="1731" height="3107" alt="">
          <img class="player__spinner-frame" data-frame="5" src="assets/spinners-full/spinner-5.webp" width="1731" height="3107" alt="">
          <img class="player__spinner-frame" data-frame="6" src="assets/spinners-full/spinner-6.webp" width="1731" height="3107" alt="">
        </div>

        <img class="player__layer player__press" id="pressRewind" src="assets/btn-rewind-pressed.webp" alt="" hidden>
        <img class="player__layer player__press" id="pressPlay" src="assets/btn-play-pressed.webp" alt="" hidden>
        <img class="player__layer player__press" id="pressFF" src="assets/btn-fast-forward-pressed.webp" alt="" hidden>
        <img class="player__layer player__press" id="pressStop" src="assets/btn-stop-pressed.webp" alt="" hidden>

        <button type="button" class="player__btn" data-action="rewind" aria-label="Rewind"></button>
        <button type="button" class="player__btn" data-action="play" aria-label="Play"></button>
        <button type="button" class="player__btn" data-action="ff" aria-label="Fast forward"></button>
        <button type="button" class="player__btn" data-action="stop" aria-label="Stop"></button>
      </div>
    </section>

    <aside class="shop" aria-label="Album purchases">
      <div class="shop__product">
        <a class="shop__image" href="https://judepascal.bigcartel.com/product/today-is-the-day-vinyl" target="_blank" rel="noopener noreferrer">
          <img src="assets/vinyl.jpg" width="1700" height="1700" alt="Today is the Day vinyl">
        </a>
        <h2 class="shop__title">
          <a href="https://judepascal.bigcartel.com/product/today-is-the-day-vinyl" target="_blank" rel="noopener noreferrer">Today is the Day - Vinyl</a>
        </h2>
      </div>
      <div class="shop__product">
        <a class="shop__image" href="https://judepascal.bigcartel.com/product/today-is-the-day-cd" target="_blank" rel="noopener noreferrer">
          <img src="assets/cd.jpg" width="1212" height="1212" alt="Today is the Day CD">
        </a>
        <h2 class="shop__title">
          <a href="https://judepascal.bigcartel.com/product/today-is-the-day-cd" target="_blank" rel="noopener noreferrer">Today is the Day - CD</a>
        </h2>
      </div>
    </aside>
  </main>

  <script src="js/player.js"></script>
</body>
</html>
